name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==================== AI SERVICE TESTS ====================
  ai-service-test:
    name: AI Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=90
        env:
          GEMINI_API_KEY: test-key
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ai-service/coverage.xml
          flags: ai-service
          fail_ci_if_error: true

  # ==================== SERVER TESTS ====================
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-secret-key-at-least-32-characters-long-for-testing
          JWT_REFRESH_SECRET: test-refresh-secret-key-at-least-32-characters-long
          GEMINI_API_KEY: test-gemini-api-key
          AI_SERVICE_URL: http://localhost:8000
          CLIENT_URL: http://localhost:3000
          NODE_ENV: test

      - name: Check coverage threshold
        run: |
          # vitest will fail if coverage is below threshold (configured in vitest.config.ts)
          echo "Coverage check passed!"

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: server/coverage/coverage-final.json
          flags: server
          fail_ci_if_error: true

  # ==================== CLIENT BUILD ====================
  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_SOCKET_URL: http://localhost:3001

  # ==================== INTEGRATION TESTS ====================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [ai-service-test, server-test]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: openresearch
          POSTGRES_PASSWORD: openresearch
          POSTGRES_DB: openresearch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AI service dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run migrations
        run: |
          cd server
          npm run db:push
        env:
          DATABASE_URL: postgresql://openresearch:openresearch@localhost:5432/openresearch

      - name: Start AI service
        run: |
          cd ai-service
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DATABASE_URL: postgresql://openresearch:openresearch@localhost:5432/openresearch
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Start server
        run: |
          cd server
          npm run dev &
          sleep 5
        env:
          DATABASE_URL: postgresql://openresearch:openresearch@localhost:5432/openresearch
          JWT_SECRET: test-secret-key-at-least-32-characters-long-for-testing
          JWT_REFRESH_SECRET: test-refresh-secret-key-at-least-32-characters-long
          AI_SERVICE_URL: http://localhost:8000
          PORT: 3001

      - name: Health checks
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3001/health || exit 1
          echo "All services healthy!"

  # ==================== DOCKER BUILD ====================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AI service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: false
          tags: openresearch/ai-service:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: openresearch/server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: openresearch/client:test
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
            NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max
