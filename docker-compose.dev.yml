version: '3.8'

services:
  # PostgreSQL Database (same as production)
  postgres:
    image: postgres:16-alpine
    dns:
      - 8.8.8.8
      - 8.8.4.4
    container_name: openresearch-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openresearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openresearch}
      POSTGRES_DB: ${POSTGRES_DB:-openresearch}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openresearch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openresearch-dev

  # Node.js Backend API (Development mode with hot reload)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
      network: host
    container_name: openresearch-server-dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-openresearch}:${POSTGRES_PASSWORD:-openresearch}@postgres:5432/${POSTGRES_DB:-openresearch}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-min-32-chars-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-min-32-chars}
      CLIENT_URL: http://localhost:3000
    volumes:
      - ./server/src:/app/src:ro
      - ./server/package.json:/app/package.json:ro
      - ./server/tsconfig.json:/app/tsconfig.json:ro
      - /app/node_modules
    ports:
      - "3001:3001"
      - "9229:9229"  # Node.js debugger port
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - openresearch-dev
    command: npm run dev

  # Next.js Frontend (Development mode with hot reload)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
      network: host
    container_name: openresearch-client-dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
      NODE_ENV: development
    volumes:
      - ./client/app:/app/app:ro
      - ./client/components:/app/components:ro
      - ./client/lib:/app/lib:ro
      - ./client/public:/app/public:ro
      - ./client/package.json:/app/package.json:ro
      - ./client/next.config.ts:/app/next.config.ts:ro
      - ./client/tsconfig.json:/app/tsconfig.json:ro
      - ./client/tailwind.config.ts:/app/tailwind.config.ts:ro
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - openresearch-dev
    command: npm run dev

  # FastAPI AI Service (Development mode with hot reload)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
      network: host
    container_name: openresearch-ai-service-dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      DATABASE_URL: postgresql://${POSTGRES_USER:-openresearch}:${POSTGRES_PASSWORD:-openresearch}@postgres:5432/${POSTGRES_DB:-openresearch}
      DEBUG: "true"
    volumes:
      - ./ai-service/app:/app/app:ro
      - ./ai-service/requirements.txt:/app/requirements.txt:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - openresearch-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data_dev:
    driver: local

networks:
  openresearch-dev:
    driver: bridge
