services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: openresearch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-openresearch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 1G

  # Backend Server (Node.js/Express)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: openresearch-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-openresearch}
      CLIENT_URL: http://${PUBLIC_HOST:-localhost}:3000
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3001:3001"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 512M

  # AI Service (Python/FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: openresearch-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-openresearch}
      DEBUG: "false"
      ALLOWED_ORIGINS: http://${PUBLIC_HOST:-localhost}:3000,http://${PUBLIC_HOST:-localhost}:3001,http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 4G

  # Frontend Client (Next.js)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://${PUBLIC_HOST:-localhost}:3001
    container_name: openresearch-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://${PUBLIC_HOST:-localhost}:3001
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  openresearch-network:
    driver: bridge

volumes:
  postgres_data:
