services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: openresearch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openresearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 1G

  # Backend Server (Node.js/Express)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: openresearch-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/openresearch
      CLIENT_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 512M

  # AI Service (Python/FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: openresearch-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/openresearch
      SERVER_URL: http://server:3001
      DEBUG: "false"
      MCP_SERVER_URLS: '{"academic_papers":"http://mcp-academic-papers:9010"}'
      MCP_REQUEST_TIMEOUT: "20"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - openresearch-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G

  # MCP Academic Papers (ArXiv)
  mcp-academic-papers:
    build:
      context: ./mcp/academic-papers
      dockerfile: Dockerfile
    container_name: openresearch-mcp-academic-papers
    restart: unless-stopped
    ports:
      - "9010:9010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Frontend Client (Next.js)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
        - NEXT_PUBLIC_WS_URL=ws://localhost:3001
        - NEXT_PUBLIC_AI_URL=http://localhost:8000
    container_name: openresearch-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_AI_URL: http://localhost:8000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - openresearch-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  openresearch-network:
    driver: bridge

volumes:
  postgres_data:
