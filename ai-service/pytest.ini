[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
# No coverage gate: the number is reported, not enforced. A threshold on a
# suite that mocks its dependencies measures how much code was imported,
# not how much behaviour is verified.
addopts = -q --cov=app --cov-report=term-missing
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
